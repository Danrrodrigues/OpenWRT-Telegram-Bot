name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shell-tests:
    name: shell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          rc=0
          for f in tests/*_test.sh; do
            echo "--- $f ---"
            sh "$f" || rc=1
          done
          exit $rc
