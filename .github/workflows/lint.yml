name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          find . -name "*.sh" -not -path "./.git/*" | while read -r f; do
            echo "Checking $f"
            shellcheck --shell=sh -e SC2018,SC2019,SC3043 "$f"
          done
