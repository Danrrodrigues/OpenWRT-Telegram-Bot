name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          rc=0
          for f in $(find . -name "*.sh" -not -path "./.git/*"); do
            echo "Checking $f"
            shellcheck -x --source-path=SCRIPTDIR --shell=sh -e SC2018,SC2019,SC3043 "$f" || rc=1
          done
          exit $rc
