name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin shellcheck to a fixed version so CI matches the local pre-push hook.
      # apt-get installs an older version whose SC2015 heuristic differs, which
      # caused "passes locally, fails in CI" mismatches.
      - name: Install shellcheck
        env:
          SHELLCHECK_VERSION: v0.11.0
        run: |
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" \
            | tar -xJ
          sudo install "shellcheck-${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: Run shellcheck
        run: |
          rc=0
          for f in $(find . -name "*.sh" -not -path "./.git/*"); do
            echo "Checking $f"
            shellcheck -x --source-path=SCRIPTDIR --shell=sh -e SC2018,SC2019,SC3043 "$f" || rc=1
          done
          exit $rc
